name: Deploy to Production

on:
  push:
    branches: [main]

# Least-privilege token: this workflow only deploys via SSH and never needs
# write access to repository contents.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: the manual approval gate (GitHub "production" Environment) was removed
    # because a single-reviewer gate deadlocks when the only reviewer is also the
    # person who pushes (GitHub blocks self-approval). To re-enable a working gate,
    # add a SECOND reviewer to the "production" environment and restore:
    #   environment:
    #     name: production
    steps:
      - name: Deploy via SSH
        # Supply-chain hardening: third-party action pinned to a full commit SHA
        # (immutable) instead of a moving tag. SHA = appleboy/ssh-action v1.2.5.
        # To update: pick a newer release's commit SHA and bump the trailing tag.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Innovera
            bash deploy.sh
