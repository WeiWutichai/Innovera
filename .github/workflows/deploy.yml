name: Deploy to Production

on:
  push:
    branches: [main]

# Least-privilege token: this workflow only deploys via SSH and never needs
# write access to repository contents.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Manual approval gate: pushing to main starts this job but it PAUSES until a
    # required reviewer approves in the GitHub "production" Environment, so a merge
    # never reaches the VPS until env/secrets/TLS prep is confirmed.
    environment:
      name: production
    steps:
      - name: Deploy via SSH
        # Supply-chain hardening: pin third-party actions to a full commit SHA
        # (e.g. appleboy/ssh-action@<40-char-sha>) instead of a moving tag.
        # Left as @v1 here to avoid guessing a SHA that could break deploy;
        # replace with a verified pinned SHA when convenient.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Innovera
            bash deploy.sh
