services:
  database:
    image: postgres:15-alpine
    container_name: innovera-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - innovera-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innovera-backend
    ports:
      - "${APP_PORT}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - innovera-network

volumes:
  postgres_data:
  uploads_data:


networks:
  innovera-network:
    driver: bridge
